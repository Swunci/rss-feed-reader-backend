services:
  backend:
    image: swunci/rss-feed-backend:latest
    expose:
      - 8081
    environment:
      - APP_ENV=production
    env_file:
      - ./.env.production
    volumes:
      - ./db-data:/app/data
    networks:
      - caddy-network

  frontend:
    image: swunci/rss-feed-frontend:latest
    expose:
      - 80
    networks:
      - caddy-network

networks:
  caddy-network:
    name: caddy-network
    external: true
